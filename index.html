<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>裂縫調查相機</title>
<style>
  :root { --bg:#0a0a0f; --border:rgba(255,255,255,0.12); --accent:#00e5ff; --accent2:#ff6b35; --text:#f0f0f0; --muted:#888; --active-bg:rgba(0,229,255,0.15); }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; font-family:'SF Mono','Courier New',monospace; touch-action:manipulation; user-select:none; }
  #video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #canvas-hidden { display:none; }
  #flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:50; transition:opacity 0.05s; }
  #flash.on { opacity:0.9; }
  #start-screen { position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:20px; }
  #start-screen h1 { color:var(--accent); font-size:20px; letter-spacing:4px; text-transform:uppercase; }
  #start-screen p { color:var(--muted); font-size:13px; text-align:center; line-height:2; padding:0 40px; }
  #btn-start { background:var(--accent); color:#000; border:none; border-radius:32px; padding:14px 44px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:2px; font-family:inherit; }
  #hud { position:absolute; top:0; left:0; right:0; z-index:20; padding:env(safe-area-inset-top,10px) 10px 0; }
  #hud-inner { background:rgba(0,0,0,0.65); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:6px 8px; display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
  .field-block { display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 2px; border-radius:8px; border:1px solid transparent; }
  .field-block.active { border-color:var(--accent); background:var(--active-bg); }
  .field-label { color:var(--muted); font-size:8px; letter-spacing:1px; text-transform:uppercase; font-weight:600; white-space:nowrap; }
  .field-block.active .field-label { color:var(--accent); }
  .field-row { display:flex; align-items:center; gap:3px; width:100%; }
  .field-value { color:var(--text); font-size:11px; font-weight:700; flex:1; text-align:center; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; line-height:1.2; }
  .mini-btn { width:20px; height:20px; border-radius:50%; border:1px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:#fff; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; line-height:1; }
  .mini-btn:active { background:rgba(0,229,255,0.4); border-color:var(--accent); transform:scale(0.88); }
  #bottom { position:absolute; bottom:0; left:0; right:0; z-index:20; padding:0 12px env(safe-area-inset-bottom,16px); background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%); }
  #preview-bar { display:flex; gap:6px; overflow-x:auto; margin-bottom:8px; scrollbar-width:none; padding:4px 0; }
  #preview-bar::-webkit-scrollbar { display:none; }
  .thumb { flex-shrink:0; width:44px; height:44px; border-radius:6px; object-fit:cover; border:2px solid rgba(255,255,255,0.4); cursor:pointer; }
  #toast { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,229,255,0.15); border:1px solid var(--accent); color:var(--accent); padding:12px 24px; border-radius:12px; font-size:13px; font-weight:700; letter-spacing:1px; opacity:0; pointer-events:none; z-index:60; transition:opacity 0.2s; white-space:nowrap; }
  #toast.show { opacity:1; }
  #save-hint { text-align:center; color:rgba(255,255,255,0.45); font-size:10px; letter-spacing:1px; margin-bottom:6px; }
  #shot-info { text-align:center; color:var(--muted); font-size:10px; letter-spacing:1px; margin-bottom:8px; }
  #shutter-row { display:flex; align-items:center; justify-content:center; gap:28px; padding-bottom:4px; }
  #btn-reset { background:rgba(255,107,53,0.12); border:1.5px solid rgba(255,107,53,0.4); color:var(--accent2); border-radius:8px; padding:8px 14px; font-size:11px; cursor:pointer; letter-spacing:1px; font-family:inherit; }
  #btn-reset:active { background:rgba(255,107,53,0.3); }
  #btn-capture { width:68px; height:68px; border-radius:50%; border:4px solid #fff; background:rgba(255,255,255,0.15); cursor:pointer; position:relative; flex-shrink:0; }
  #btn-capture::after { content:''; position:absolute; inset:5px; border-radius:50%; background:#fff; transition:all 0.1s; }
  #btn-capture:active::after { inset:9px; background:#ddd; }
  #btn-flip { width:42px; height:42px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.08); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #btn-flip:active { background:rgba(255,255,255,0.2); }
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px; }
  #lightbox.show { display:flex; }
  #lightbox img { max-width:92vw; max-height:72vh; border-radius:8px; object-fit:contain; }
  #lb-info { color:#fff; font-size:12px; text-align:center; line-height:1.8; white-space:pre-line; }
  #lb-btns { display:flex; gap:12px; }
  .lb-btn { padding:10px 24px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:inherit; }
  #lb-save { background:var(--accent); color:#000; }
  #lb-close { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div id="start-screen">
  <h1>裂縫調查相機</h1>
  <p>授權相機後開始使用<br>上下鍵切換選項・空白鍵拍照</p>
  <button id="btn-start" onclick="startCamera()">開始使用</button>
</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-hidden"></canvas>
<div id="flash"></div>
<div id="toast"></div>
<div id="lightbox">
  <img id="lb-img" src="" alt="">
  <div id="lb-info"></div>
  <div id="lb-btns">
    <button class="lb-btn" id="lb-save" onclick="lbSave()">儲存到相簿</button>
    <button class="lb-btn" id="lb-close" onclick="lbClose()">關閉</button>
  </div>
</div>
<div id="hud"><div id="hud-inner">
  <div class="field-block active" id="blk-0"><span class="field-label">樓層</span><div class="field-row"><button class="mini-btn" onclick="step(0,-1)">-</button><div class="field-value" id="val-0">1F</div><button class="mini-btn" onclick="step(0,1)">+</button></div></div>
  <div class="field-block" id="blk-1"><span class="field-label">數量</span><div class="field-row"><button class="mini-btn" onclick="step(1,-1)">-</button><div class="field-value" id="val-1">0條</div><button class="mini-btn" onclick="step(1,1)">+</button></div></div>
  <div class="field-block" id="blk-2"><span class="field-label">方向</span><div class="field-row"><button class="mini-btn" onclick="step(2,-1)">-</button><div class="field-value" id="val-2">無</div><button class="mini-btn" onclick="step(2,1)">+</button></div></div>
  <div class="field-block" id="blk-3"><span class="field-label">寬度</span><div class="field-row"><button class="mini-btn" onclick="step(3,-1)">-</button><div class="field-value" id="val-3">無</div><button class="mini-btn" onclick="step(3,1)">+</button></div></div>
  <div class="field-block" id="blk-4"><span class="field-label">長度</span><div class="field-row"><button class="mini-btn" onclick="step(4,-1)">-</button><div class="field-value" id="val-4">100以下</div><button class="mini-btn" onclick="step(4,1)">+</button></div></div>
</div></div>
<div id="bottom">
  <div id="preview-bar"></div>
  <div id="save-hint">點縮圖可預覽並儲存</div>
  <div id="shot-info">尚未拍攝</div>
  <div id="shutter-row">
    <button id="btn-reset" onclick="resetAll()">歸零</button>
    <button id="btn-capture" onclick="capturePhoto()"></button>
    <button id="btn-flip" onclick="flipCamera()">🔄</button>
  </div>
</div>
<script>
const FIELDS=[
  {label:'樓層',opts:['B4','B3','B2','B1','1F','2F','3F','4F','5F','6F','7F','8F','9F','10F','11F','12F','13F','14F','15F','16F','17F','18F','19F','20F'],idx:4},
  {label:'裂縫數量',opts:['0條','5條以下','10條以下','佈滿'],idx:0},
  {label:'裂縫方向',opts:['無','垂直','水平','45度'],idx:0},
  {label:'裂縫寬度',opts:['無','0.1mm','0.2mm','0.3mm','0.3mm以上'],idx:0},
  {label:'裂縫長度',opts:['100cm以下','100cm以上'],idx:0}
];
let activeField=0,stream=null,facingMode='environment',shotsTaken=0,currentLbUrl='';
function getVal(i){return FIELDS[i].opts[FIELDS[i].idx];}
function renderAll(){FIELDS.forEach(function(f,i){document.getElementById('val-'+i).textContent=getVal(i);document.getElementById('blk-'+i).classList.toggle('active',i===activeField);});}
function step(fi,d){var f=FIELDS[fi];f.idx=(f.idx+d+f.opts.length)%f.opts.length;activeField=fi;renderAll();}
function resetAll(){FIELDS[0].idx=4;FIELDS[1].idx=0;FIELDS[2].idx=0;FIELDS[3].idx=0;FIELDS[4].idx=0;renderAll();}
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode,width:{ideal:1280},height:{ideal:720}},audio:false})
  .then(function(s){
    stream=s;
    document.getElementById('video').srcObject=s;
    document.getElementById('start-screen').style.display='none';
  })
  .catch(function(e){alert('相機錯誤：'+e.name+'\n'+e.message);});
}
function flipCamera(){
  facingMode=facingMode==='environment'?'user':'environment';
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
  navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode},audio:false})
  .then(function(s){stream=s;document.getElementById('video').srcObject=s;})
  .catch(function(e){alert('切換失敗：'+e.message);});
}
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&stream){
    var tracks=stream.getVideoTracks();
    if(!tracks.length||tracks[0].readyState==='ended'){
      navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode},audio:false})
      .then(function(s){stream=s;document.getElementById('video').srcObject=s;})
      .catch(function(){});
    }
  }
});
function capturePhoto(){
  var v=document.getElementById('video'),c=document.getElementById('canvas-hidden'),x=c.getContext('2d');
  c.width=v.videoWidth||1280;c.height=v.videoHeight||720;
  x.drawImage(v,0,0,c.width,c.height);
  var lines=['樓層：'+getVal(0),'數量：'+getVal(1),'方向：'+getVal(2),'寬度：'+getVal(3),'長度：'+getVal(4)];
  var fs=Math.round(c.width*0.026),lh=Math.round(fs*1.55),pad=Math.round(fs*0.7);
  x.font='bold '+fs+'px Courier New,monospace';
  var mw=Math.max.apply(null,lines.map(function(l){return x.measureText(l).width;}));
  var bw=mw+pad*2,bh=lh*lines.length+pad*1.4,bx=20,by=20,br=10;
  x.shadowColor='rgba(0,0,0,0.6)';x.shadowBlur=12;x.fillStyle='rgba(0,0,0,0.82)';rr(x,bx,by,bw,bh,br);x.fill();x.shadowBlur=0;
  x.strokeStyle='rgba(255,255,255,0.7)';x.lineWidth=2;rr(x,bx,by,bw,bh,br);x.stroke();
  x.font='bold '+fs+'px Courier New,monospace';x.textAlign='left';
  lines.forEach(function(l,i){
    var y=by+pad+lh*(i+0.78),p=l.split('：');
    x.fillStyle='rgba(0,229,255,0.7)';x.fillText(p[0]+'：',bx+pad,y);
    var lw=x.measureText(p[0]+'：').width;x.fillStyle='#fff';x.fillText(p[1],bx+pad+lw,y);
  });
  document.getElementById('flash').classList.add('on');
  setTimeout(function(){document.getElementById('flash').classList.remove('on');},120);
  var dataUrl=c.toDataURL('image/jpeg',0.92);
  shotsTaken++;addThumb(dataUrl);
  document.getElementById('shot-info').textContent='已拍 '+shotsTaken+' 張・'+getVal(0)+' '+getVal(1);
  showToast('已拍攝！點縮圖儲存');
}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
function addThumb(s){var b=document.getElementById('preview-bar'),i=document.createElement('img');i.src=s;i.className='thumb';i.onclick=function(){openLightbox(s);};b.appendChild(i);b.scrollLeft=b.scrollWidth;}
function openLightbox(s){currentLbUrl=s;document.getElementById('lb-img').src=s;document.getElementById('lb-info').textContent=getVal(0)+' ・ '+getVal(1)+' ・ '+getVal(2)+'\n寬度 '+getVal(3)+' ・ 長度 '+getVal(4);document.getElementById('lightbox').classList.add('show');}
function lbClose(){document.getElementById('lightbox').classList.remove('show');}
function lbSave(){var a=document.createElement('a');a.href=currentLbUrl;a.download='crack_'+getVal(0)+'_'+Date.now()+'.jpg';a.click();showToast('正在儲存...');lbClose();}
function rr(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.lineTo(px+w-r,py);x.quadraticCurveTo(px+w,py,px+w,py+r);x.lineTo(px+w,py+h-r);x.quadraticCurveTo(px+w,py+h,px+w-r,py+h);x.lineTo(px+r,py+h);x.quadraticCurveTo(px,py+h,px,py+h-r);x.lineTo(px,py+r);x.quadraticCurveTo(px,py,px+r,py);x.closePath();}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowUp'){step(activeField,-1);e.preventDefault();}
  if(e.key==='ArrowDown'){step(activeField,1);e.preventDefault();}
  if(e.key==='ArrowLeft'){activeField=(activeField-1+FIELDS.length)%FIELDS.length;renderAll();}
  if(e.key==='ArrowRight'){activeField=(activeField+1)%FIELDS.length;renderAll();}
  if(e.key===' '||e.key==='Enter')capturePhoto();
  if(e.key==='0')resetAll();
  if(e.key>='1'&&e.key<='5'){activeField=parseInt(e.key)-1;renderAll();}
});
renderAll();
</script>
</body>
</html>
